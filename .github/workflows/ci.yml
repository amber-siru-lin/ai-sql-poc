name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: python-tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ai_sql
          POSTGRES_PASSWORD: ai_sql_dev
          POSTGRES_DB: ai_sql_poc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_sql -d ai_sql_poc"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ai_sql:ai_sql_dev@localhost:5432/ai_sql_poc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml
          pip install -r requirements.txt

      - name: Run pytest
        run: PYTHONPATH=. python -m pytest tests/ -q

  ui-build:
    name: ui-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install and build UI
        working-directory: ui
        run: |
          npm install --no-audit --no-fund
          npm run build
