name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  block-sensitive-paths:
    name: block-sensitive-paths
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block secrets and profile paths
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            scripts/check-sensitive-paths.sh --ci \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.sha }}"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            git diff --name-only --diff-filter=ACMR "${{ github.sha }}"~1 "${{ github.sha }}" \
              | scripts/check-sensitive-paths.sh --from-file /dev/stdin
          else
            scripts/check-sensitive-paths.sh --ci \
              "${{ github.event.before }}" \
              "${{ github.sha }}"
          fi
